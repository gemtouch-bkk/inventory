name: Apply Excel CSV import feature

on:
  push:
    branches: [feature/excel-csv-import]
    paths: [.github/workflows/apply-import-feature.yml]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/excel-csv-import
      - name: Patch index.html
        shell: python
        run: |
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          css = r'''
    .import-modal-backdrop { position:fixed; inset:0; background:rgba(15,23,42,.62); z-index:1000; display:flex; align-items:center; justify-content:center; padding:18px; }
    .import-modal { width:min(1100px,100%); max-height:90vh; overflow:auto; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; box-shadow:0 24px 70px rgba(0,0,0,.28); }
    .import-summary { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:14px 0; }
    .import-status-ready { color:var(--success); font-weight:700; }
    .import-status-warning { color:var(--warning); font-weight:700; }
    .import-status-error { color:var(--danger); font-weight:700; }
    .import-options { display:flex; gap:16px; flex-wrap:wrap; margin:12px 0; }
    .import-options label { display:flex; gap:6px; align-items:center; margin:0; color:var(--text); }
    .import-options input { width:auto; }
    #importPreviewTable { min-width:900px; }
    @media (max-width:700px) { .import-summary { grid-template-columns:1fr 1fr; } }
'''
          text = text.replace('\n  </style>', css + '\n  </style>', 1)

          modal = r'''
    <div id="importModal" class="import-modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="importTitle">
      <div class="import-modal">
        <div class="stone-title">
          <div><h2 id="importTitle" style="margin-bottom:4px">Import Excel / CSV</h2><p class="muted" id="importFileName" style="margin:0"></p></div>
          <button class="light" type="button" onclick="closeImportPreview()">Close</button>
        </div>
        <div class="import-summary">
          <div class="stat"><span class="muted">Rows found</span><b id="importTotal">0</b></div>
          <div class="stat"><span class="muted">Ready</span><b id="importReady">0</b></div>
          <div class="stat"><span class="muted">Warnings</span><b id="importWarnings">0</b></div>
          <div class="stat"><span class="muted">Errors</span><b id="importErrors">0</b></div>
        </div>
        <div class="import-options">
          <label><input type="radio" name="importMode" value="add" checked /> Add new; skip matching Stone IDs</label>
          <label><input type="radio" name="importMode" value="update" /> Update matching Stone IDs and add new</label>
        </div>
        <p class="muted" style="margin:8px 0">Nothing is saved until you press Confirm Import. Rows with errors are not imported.</p>
        <div class="table-wrap"><table id="importPreviewTable"><thead><tr><th>Row</th><th>Stone ID</th><th>Type</th><th>Weight</th><th>Color</th><th>Buy</th><th>Status</th><th>Validation</th></tr></thead><tbody id="importPreviewBody"></tbody></table></div>
        <div class="actions"><button class="success" id="confirmImportBtn" type="button" onclick="confirmImport()">Confirm Import</button><button class="light" type="button" onclick="closeImportPreview()">Cancel</button></div>
      </div>
    </div>
'''
          text = text.replace('\n    <section class="card hidden" id="detailCard"', modal + '\n    <section class="card hidden" id="detailCard"', 1)

          buttons = r'''<button class="success write-only" type="button" onclick="openImportPicker()">Import Excel/CSV</button>
             <input id="importFile" class="hidden" type="file" accept=".xlsx,.xls,.csv,text/csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel" onchange="handleImportFile(event)" />
             '''
          text = text.replace('<button class="light write-only" onclick="exportCSV()">Export CSV</button>', buttons + '<button class="light write-only" onclick="exportCSV()">Export CSV</button>', 1)

          text = text.replace('<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>', '<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>\n  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>', 1)

          js = r'''
let pendingImportRows = [];

const IMPORT_FIELDS = {
  "stone id":"stoneId", "stoneid":"stoneId", "id":"stoneId",
  "type":"type", "gem type":"type", "gemtype":"type",
  "weight":"weight", "weight / size":"weight", "weight/size":"weight", "size":"weight",
  "origin":"origin", "color":"color", "cutting":"cutting", "cut":"cutting",
  "clarity":"clarity", "treatment":"treatment", "certificate":"certificate", "cert":"certificate",
  "buy price":"buyPrice", "buying price":"buyPrice", "cost":"buyPrice",
  "sell/ask price":"sellPrice", "sell price":"sellPrice", "asking price":"sellPrice", "selling price":"sellPrice",
  "status":"status", "location":"location", "memo in name":"memoIn", "memo in":"memoIn",
  "memo out name":"memoOut", "memo out":"memoOut", "owner":"owner",
  "bought from":"boughtFrom", "seller":"boughtFrom", "source":"boughtFrom", "notes":"notes", "note":"notes"
};

function normalizeImportHeader(value) { return String(value ?? "").trim().toLowerCase().replace(/[_-]+/g, " ").replace(/\s+/g, " "); }
function importText(value) { return String(value ?? "").trim(); }
function importNumber(value) {
  if (value === null || value === undefined || value === "") return 0;
  const cleaned = String(value).replace(/[$,\s]/g, "");
  const number = Number(cleaned);
  return Number.isFinite(number) ? number : NaN;
}
function canonicalChoice(value, choices, fallback) {
  const wanted = importText(value).toLowerCase().replace(/\s+/g, "");
  return choices.find(choice => choice.toLowerCase().replace(/\s+/g, "") === wanted) || fallback;
}
function normalizeStoneType(value) {
  const aliases = { "damburite":"Danburite", "danburite":"Danburite", "rhodolite":"Garnet (Rhodolite)", "spessartite":"Garnet (Spessartite)" };
  const raw = importText(value);
  if (aliases[raw.toLowerCase()]) return aliases[raw.toLowerCase()];
  return canonicalChoice(raw, Object.keys(gemColors), raw || "Ruby");
}
function mapImportRow(source, rowNumber) {
  const mapped = {};
  Object.entries(source || {}).forEach(([header, value]) => {
    const field = IMPORT_FIELDS[normalizeImportHeader(header)];
    if (field) mapped[field] = value;
  });
  const stoneId = importText(mapped.stoneId);
  const type = normalizeStoneType(mapped.type);
  const buyPrice = importNumber(mapped.buyPrice);
  const sellPrice = importNumber(mapped.sellPrice);
  const errors = [];
  const warnings = [];
  if (!stoneId) errors.push("Missing Stone ID");
  if (!Number.isFinite(buyPrice)) errors.push("Invalid buy price");
  if (!Number.isFinite(sellPrice)) errors.push("Invalid sell price");
  if (!Object.keys(gemColors).includes(type)) warnings.push("Unrecognized gem type");
  const duplicate = stoneId && stones.some(s => String(s.stoneId || "").toLowerCase() === stoneId.toLowerCase());
  if (duplicate) warnings.push("Stone ID already exists");
  const status = canonicalChoice(mapped.status, ["In Stock","Reserved","Sent to Lab","With Customer","Sold"], "In Stock");
  return {
    rowNumber, duplicate, errors, warnings,
    stone: {
      stoneId, type, weight:importText(mapped.weight), origin:importText(mapped.origin), color:importText(mapped.color),
      cutting:canonicalChoice(mapped.cutting, ["Round","Oval","Cushion","Heart","Pear","Emerald","Marquise","Mixed"], importText(mapped.cutting) || "Round"),
      clarity:canonicalChoice(mapped.clarity, ["Flawless","Internally Flawless","VVS1","VVS2","VS1","VS2","SI1","SI2","I1","I2","I3"], importText(mapped.clarity) || "Flawless"),
      treatment:canonicalChoice(mapped.treatment, ["Unknown","Unheated","Heated","Treated","Untreated"], importText(mapped.treatment) || "Unknown"),
      certificate:importText(mapped.certificate), buyPrice:Number.isFinite(buyPrice) ? buyPrice : 0, sellPrice:Number.isFinite(sellPrice) ? sellPrice : 0,
      status, location:importText(mapped.location), memoIn:importText(mapped.memoIn), memoOut:importText(mapped.memoOut), owner:importText(mapped.owner),
      boughtFrom:importText(mapped.boughtFrom), notes:importText(mapped.notes), photos:[], events:[]
    }
  };
}
function openImportPicker() {
  if (!currentUser) return alert("Please login first.");
  if (!canWrite()) return alert("Viewer users cannot import stones.");
  document.getElementById("importFile").click();
}
async function handleImportFile(event) {
  const file = event.target.files && event.target.files[0];
  event.target.value = "";
  if (!file) return;
  try {
    const data = await file.arrayBuffer();
    const workbook = XLSX.read(data, { type:"array", cellDates:true });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rawRows = XLSX.utils.sheet_to_json(sheet, { defval:"", raw:false });
    if (!rawRows.length) return alert("No data rows were found in the first sheet.");
    pendingImportRows = rawRows.map((row, index) => mapImportRow(row, index + 2));
    showImportPreview(file.name);
  } catch (error) { alert("Could not read this file: " + error.message); }
}
function showImportPreview(fileName) {
  document.getElementById("importFileName").textContent = fileName;
  document.getElementById("importTotal").textContent = pendingImportRows.length;
  document.getElementById("importReady").textContent = pendingImportRows.filter(r => !r.errors.length && !r.warnings.length).length;
  document.getElementById("importWarnings").textContent = pendingImportRows.filter(r => !r.errors.length && r.warnings.length).length;
  document.getElementById("importErrors").textContent = pendingImportRows.filter(r => r.errors.length).length;
  document.getElementById("importPreviewBody").innerHTML = pendingImportRows.slice(0, 200).map(row => {
    const messages = row.errors.length ? row.errors : row.warnings.length ? row.warnings : ["Ready"];
    const cls = row.errors.length ? "import-status-error" : row.warnings.length ? "import-status-warning" : "import-status-ready";
    return `<tr><td>${row.rowNumber}</td><td><b>${escapeHtml(row.stone.stoneId || "—")}</b></td><td>${escapeHtml(row.stone.type)}</td><td>${escapeHtml(row.stone.weight)}</td><td>${escapeHtml(row.stone.color)}</td><td>${money(row.stone.buyPrice)}</td><td>${escapeHtml(row.stone.status)}</td><td class="${cls}">${escapeHtml(messages.join("; "))}</td></tr>`;
  }).join("");
  document.getElementById("confirmImportBtn").disabled = !pendingImportRows.some(r => !r.errors.length);
  document.getElementById("importModal").classList.remove("hidden");
}
function closeImportPreview() { document.getElementById("importModal").classList.add("hidden"); pendingImportRows = []; }
async function confirmImport() {
  if (!currentUser || !canWrite()) return alert("You do not have permission to import.");
  const mode = document.querySelector('input[name="importMode"]:checked').value;
  const valid = pendingImportRows.filter(r => !r.errors.length && (mode === "update" || !r.duplicate));
  if (!valid.length) return alert("There are no valid rows to import with this option.");
  if (!confirm(`Import ${valid.length} stone record(s)?`)) return;
  const button = document.getElementById("confirmImportBtn");
  button.disabled = true; button.textContent = "Importing...";
  try {
    const existingByStoneId = new Map(stones.map(s => [String(s.stoneId || "").toLowerCase(), s]));
    let imported = 0;
    for (let start = 0; start < valid.length; start += 400) {
      const batch = db.batch();
      valid.slice(start, start + 400).forEach(row => {
        const existing = existingByStoneId.get(row.stone.stoneId.toLowerCase());
        const ref = existing ? stonesCollection().doc(existing.id) : stonesCollection().doc();
        const payload = { ...row.stone, updatedAt:firebase.firestore.FieldValue.serverTimestamp() };
        if (existing) { payload.events = existing.events || []; payload.photos = existing.photos || []; }
        else {
          payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
          payload.events = [{ id:uid(), date:new Date().toISOString().slice(0,10), type:"Created", amount:payload.buyPrice || "", description:"Stone record imported from spreadsheet." }];
        }
        batch.set(ref, payload, { merge:true });
        imported++;
      });
      await batch.commit();
    }
    closeImportPreview();
    alert(`Import complete: ${imported} record(s) saved.`);
  } catch (error) { alert("Import failed: " + error.message); }
  finally { button.disabled = false; button.textContent = "Confirm Import"; }
}
'''
          text = text.replace('\nfunction exportCSV() {', js + '\nfunction exportCSV() {', 1)

          required = ['Import Excel/CSV', 'handleImportFile', 'confirmImport', 'xlsx.full.min.js']
          missing = [item for item in required if item not in text]
          if missing:
            raise SystemExit('Patch failed, missing: ' + ', '.join(missing))
          path.write_text(text, encoding='utf-8')
      - name: Commit feature
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "feat: add Excel and CSV inventory import preview"
          git push origin feature/excel-csv-import
