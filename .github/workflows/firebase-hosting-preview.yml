name: Deploy Firebase preview

on:
  pull_request:
    branches:
      - main

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  preview:
    if: github.head_ref == 'feature/excel-csv-import'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_GEMTOUCHINVENTORY }}'
          channelId: import-preview
          expires: 7d
          projectId: gemtouchinventory
