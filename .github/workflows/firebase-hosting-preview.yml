name: Deploy Firebase preview

on:
  push:
    branches:
      - feature/excel-csv-import

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_GEMTOUCHINVENTORY }}'
          channelId: import-preview
          expires: 7d
          projectId: gemtouchinventory
