name: Sync live Firebase index

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Download exact live Firebase HTML
        run: |
          curl -L --fail --silent --show-error https://gemtouchinventory.web.app/ -o index.html
          grep -q "Gemstone Inventory Tracker - Cloud" index.html
          grep -q "gemtouchinventory" index.html
          ! grep -q "inventory-83000" index.html

      - name: Commit synced index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Sync index from live Firebase site" || exit 0
          git push
